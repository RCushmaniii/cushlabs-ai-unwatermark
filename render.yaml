services:
  - type: web
    name: unwatermark
    runtime: python
    plan: free
    buildCommand: pip install -e ".[deploy]"
    startCommand: uvicorn unwatermark.web:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: REPLICATE_API_TOKEN
        sync: false
      - key: UNWATERMARK_INPAINT_BACKEND
        value: replicate
      - key: PYTHON_VERSION
        value: "3.11.11"
